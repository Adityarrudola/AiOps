kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ai-observability
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30030
        hostPort: 30030
        protocol: TCP
      - containerPort: 30800
        hostPort: 30800
        protocol: TCP
      - containerPort: 8001
        hostPort: 8001
        protocol: TCP
containerdConfigPatches:
  - |
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://localhost:5001"]
