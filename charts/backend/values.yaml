replicaCount: 1

image:
  repository: localhost:5000/backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

probe:
  readinessPath: /health
  livenessPath: /health

prometheus:
  enabled: true
